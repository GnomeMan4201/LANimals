<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LANimals</title>
<style>
:root{
  --bg:#0b0b0d;--panel:#111115;--panel2:#17171d;--border:#252530;
  --text:#f0f1f3;--muted:#7a8090;--red:#d61f2c;--red2:#a6111b;--red3:#ff4455;
  --warn:#c97b00;--ok:#2a9d4e;--info:#3b7ecf;
  --font:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;overflow:hidden;}
body{display:grid;grid-template-rows:48px 1fr 200px;grid-template-columns:1fr;}

/* TOP BAR */
.topbar{
  display:grid;grid-template-columns:auto 1fr auto;align-items:center;
  gap:16px;padding:0 16px;
  border-bottom:1px solid var(--border);background:#0d0d11;z-index:10;
}
.brand{font-size:20px;font-weight:900;letter-spacing:.04em;user-select:none;white-space:nowrap;}
.brand span.LA{color:var(--red);}
.brand span.Nimals{color:var(--text);}
.topbar-center{display:flex;align-items:center;gap:10px;min-width:0;}
.scope-label{color:var(--muted);font-size:10px;white-space:nowrap;}
#cidrInput{
  background:#0b0b0d;color:var(--text);border:1px solid var(--border);
  border-radius:5px;padding:4px 9px;width:150px;font-family:var(--font);font-size:12px;
}
#cidrInput:focus{outline:none;border-color:var(--red);}
.topbar-right{display:flex;gap:6px;align-items:center;}
.status-pip{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0;}
.status-pip.scanning{background:var(--warn);animation:pulse .8s infinite;}
.status-pip.error{background:var(--red3);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
#statusLabel{color:var(--muted);font-size:10px;}

/* MAIN GRID */
.main{display:grid;grid-template-columns:240px 1fr 340px;min-height:0;overflow:hidden;}

/* ── LEFT RAIL ── */
.rail{
  background:var(--panel);border-right:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0;overflow-y:auto;
  scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.rail-section{border-bottom:1px solid var(--border);padding:10px 12px;}
.rail-section.collapsed .rail-body{display:none;}
.rail-hdr{
  display:flex;align-items:center;justify-content:space-between;
  cursor:pointer;user-select:none;margin-bottom:8px;
}
.rail-hdr h4{
  font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);
}
.rail-hdr .toggle{font-size:10px;color:var(--muted);}
.rail-section.collapsed .rail-hdr{margin-bottom:0;}

.op-btn{
  display:flex;align-items:center;gap:7px;width:100%;
  background:var(--panel2);border:1px solid var(--border);border-radius:5px;
  color:var(--text);padding:7px 9px;cursor:pointer;font-family:var(--font);
  font-size:11px;font-weight:600;margin-bottom:5px;transition:border-color .12s,background .12s;
  text-align:left;
}
.op-btn:last-child{margin-bottom:0;}
.op-btn:hover{border-color:var(--red);}
.op-btn:disabled{opacity:.35;cursor:not-allowed;}
.op-btn:disabled:hover{border-color:var(--border);}
.op-btn.primary{background:rgba(214,31,44,.14);border-color:var(--red2);}
.op-btn.primary:hover{background:rgba(214,31,44,.24);}
.op-btn.active{border-color:var(--info);background:rgba(59,126,207,.1);}
.op-btn .icon{font-size:13px;flex-shrink:0;width:16px;text-align:center;}
.op-btn .lbl{flex:1;}
.op-btn .badge{
  font-size:9px;background:var(--border);border-radius:3px;
  padding:1px 4px;color:var(--muted);
}
.op-btn .badge.warn{background:rgba(201,123,0,.2);color:var(--warn);}
.op-btn .badge.ok{background:rgba(42,157,78,.2);color:var(--ok);}
.op-btn .badge.run{background:rgba(59,126,207,.2);color:var(--info);}
.op-btn .badge.err{background:rgba(214,31,44,.2);color:var(--red3);}

.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.stat{background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:7px 9px;}
.stat .sv{font-size:18px;font-weight:800;line-height:1;}
.stat .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.stat .sv.red{color:var(--red3);}
.stat .sv.warn{color:var(--warn);}
.stat .sv.ok{color:var(--ok);}

/* ── GRAPH ── */
.canvas-wrap{
  position:relative;
  background:radial-gradient(ellipse at center,rgba(214,31,44,.035),transparent 65%),var(--bg);
  min-height:0;overflow:hidden;
}
canvas#graphCanvas{width:100%;height:100%;display:block;}
.graph-tools{
  position:absolute;bottom:10px;right:10px;
  display:flex;gap:5px;
}
.gt-btn{
  background:rgba(17,17,21,.88);border:1px solid var(--border);
  border-radius:5px;color:var(--muted);padding:5px 9px;cursor:pointer;
  font-family:var(--font);font-size:11px;backdrop-filter:blur(4px);
}
.gt-btn:hover{border-color:var(--red);color:var(--text);}
.graph-search{
  position:absolute;top:10px;left:10px;
  display:flex;gap:5px;
}
.graph-search input,.graph-search select{
  background:rgba(17,17,21,.9);color:var(--text);border:1px solid var(--border);
  border-radius:5px;padding:5px 9px;font-family:var(--font);font-size:11px;
  backdrop-filter:blur(4px);
}
.graph-search input{width:140px;}
.graph-search input:focus,.graph-search select:focus{outline:none;border-color:var(--red);}
.graph-search select{background:rgba(17,17,21,.9);}

/* ── RIGHT PANEL ── */
.detail-panel{
  background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;min-height:0;
}
.dp-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 12px 8px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--panel);z-index:1;flex-shrink:0;
}
.dp-hdr h4{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.dp-hdr-actions{display:flex;gap:4px;}
.dp-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.detail-section{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.detail-section h5{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.kv{display:grid;grid-template-columns:88px 1fr;gap:2px 6px;align-items:baseline;margin-bottom:1px;}
.kv .k{color:var(--muted);font-size:10px;}
.kv .v{color:var(--text);font-size:11px;word-break:break-all;}
.kv .v.red{color:var(--red3);}
.kv .v.warn{color:var(--warn);}
.kv .v.ok{color:var(--ok);}
.kv .v.info{color:var(--info);}
.risk-bar{height:3px;border-radius:2px;background:var(--border);margin-top:5px;}
.risk-fill{height:100%;border-radius:2px;transition:width .3s;}
.svc-table{width:100%;border-collapse:collapse;font-size:10px;}
.svc-table th{color:var(--muted);font-weight:600;text-align:left;padding:2px 3px;border-bottom:1px solid var(--border);}
.svc-table td{padding:2px 3px;border-bottom:1px solid rgba(255,255,255,.025);font-family:var(--font);}
.svc-table tr:hover td{background:rgba(255,255,255,.025);}
.neighbor-chip{
  display:inline-flex;align-items:center;gap:3px;
  background:var(--panel2);border:1px solid var(--border);border-radius:3px;
  padding:2px 6px;font-size:10px;cursor:pointer;margin:2px;
}
.neighbor-chip:hover{border-color:var(--red);}
.evt-row{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.025);}
.evt-row .et{font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:1px;}
.evt-row .es{color:var(--muted);font-size:10px;}
.sev-info{color:var(--info);}
.sev-warning{color:var(--warn);}
.sev-critical,.sev-high{color:var(--red3);}
.sev-ok,.sev-normal{color:var(--ok);}
.scan-btn-node{
  width:100%;background:rgba(214,31,44,.12);border:1px solid var(--red2);
  border-radius:5px;color:var(--text);padding:7px;cursor:pointer;
  font-family:var(--font);font-size:11px;font-weight:700;margin-top:5px;
}
.scan-btn-node:hover{background:rgba(214,31,44,.22);}
.scan-btn-node:disabled{opacity:.4;cursor:not-allowed;}
.empty-state{color:var(--muted);font-size:11px;padding:4px 0;}
.src-tag{
  display:inline-block;background:rgba(59,126,207,.15);border:1px solid rgba(59,126,207,.3);
  border-radius:3px;padding:1px 5px;font-size:9px;color:var(--info);margin:1px;
}

/* ── BOTTOM ── */
.bottom{
  border-top:1px solid var(--border);background:#0d0d11;
  display:grid;grid-template-rows:32px 1fr;min-height:0;
}
.bottom-tabs{
  display:flex;align-items:stretch;border-bottom:1px solid var(--border);
  padding:0 12px;gap:2px;flex-shrink:0;
}
.tab-btn{
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--muted);cursor:pointer;font-family:var(--font);
  font-size:10px;font-weight:600;text-transform:uppercase;
  letter-spacing:.07em;padding:0 9px;
}
.tab-btn.active{color:var(--text);border-bottom-color:var(--red);}
.tab-btn:hover{color:var(--text);}
.bottom-content{min-height:0;overflow:hidden;position:relative;}
.tab-pane{
  position:absolute;inset:0;overflow-y:auto;padding:6px 12px;
  display:none;scrollbar-width:thin;scrollbar-color:var(--border) transparent;
}
.tab-pane.active{display:block;}
.log-line{
  font-size:10px;font-family:var(--font);line-height:1.65;
  white-space:pre-wrap;word-break:break-all;color:var(--text);
}
.log-line.err{color:var(--red3);}
.log-line.warn{color:var(--warn);}
.log-line.ok{color:var(--ok);}
.log-line.muted{color:var(--muted);}
.feed-row{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.025);}
.feed-row .fhdr{display:flex;align-items:baseline;gap:7px;margin-bottom:1px;}
.feed-row .ft{font-size:9px;color:var(--muted);}
.feed-row .fs{font-size:10px;color:var(--muted);}
.sysinfo-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px 0;}
.sysinfo-card{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:8px 10px;}
.sysinfo-card .sc-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.sysinfo-card .sc-value{font-size:14px;font-weight:800;}
.sysinfo-card .sc-value.ok{color:var(--ok);}
.sysinfo-card .sc-value.warn{color:var(--warn);}
.bar-bg{height:3px;background:var(--border);border-radius:2px;margin-top:5px;}
.bar-fg{height:100%;border-radius:2px;}
.iface-row{font-size:10px;padding:2px 0;color:var(--muted);}
.iface-row span{color:var(--text);}

/* Buttons */
button{cursor:pointer;font-family:var(--font);}
.btn{
  background:var(--panel2);border:1px solid var(--border);border-radius:5px;
  color:var(--text);padding:5px 10px;font-size:11px;font-weight:600;
}
.btn:hover{border-color:var(--red);}
.btn.primary{background:var(--red);border-color:var(--red2);}
.btn.primary:hover{background:var(--red2);}
.btn.sm{padding:3px 7px;font-size:10px;}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="brand"><span class="LA">LAN</span><span class="Nimals">imals</span></div>
  <div class="topbar-center">
    <span class="scope-label">CIDR</span>
    <input id="cidrInput" value="192.168.0.0/24" placeholder="192.168.0.0/24" title="Scan target range"/>
    <div class="status-pip" id="statusDot"></div>
    <span id="statusLabel">ready</span>
  </div>
  <div class="topbar-right">
    <button class="btn sm" id="btnRefresh" title="Refresh graph from cache">↻ Refresh</button>
    <button class="btn sm" id="btnCenter" title="Reset graph view">⊕ Center</button>
    <button class="btn sm" id="btnSysinfo" title="System info">≡ Sysinfo</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">

  <!-- LEFT RAIL -->
  <div class="rail">

    <div class="rail-section" id="sec-ops">
      <div class="rail-hdr" onclick="toggleSection('sec-ops')">
        <h4>Operations</h4><span class="toggle" id="tog-sec-ops">▾</span>
      </div>
      <div class="rail-body">
        <button class="op-btn primary" id="btnDiscovery">
          <span class="icon">◎</span><span class="lbl">Discovery Scan</span>
        </button>
        <button class="op-btn" id="btnArp">
          <span class="icon">⬡</span><span class="lbl">ARP Refresh</span>
        </button>
        <button class="op-btn" id="btnHostmap">
          <span class="icon">⬡</span><span class="lbl">Host Mapping</span>
        </button>
        <button class="op-btn" id="btnRogue">
          <span class="icon">⚑</span><span class="lbl">Rogue Detection</span>
        </button>
        <button class="op-btn" id="btnInventory">
          <span class="icon">≡</span><span class="lbl">Inventory</span>
        </button>
      </div>
    </div>

    <div class="rail-section" id="sec-stats">
      <div class="rail-hdr" onclick="toggleSection('sec-stats')">
        <h4>Network Stats</h4><span class="toggle" id="tog-sec-stats">▾</span>
      </div>
      <div class="rail-body">
        <div class="stat-grid">
          <div class="stat"><div class="sv" id="statHosts">—</div><div class="sl">Hosts</div></div>
          <div class="stat"><div class="sv" id="statSvc">—</div><div class="sl">Services</div></div>
          <div class="stat"><div class="sv warn" id="statWarn">—</div><div class="sl">Warnings</div></div>
          <div class="stat"><div class="sv red" id="statCrit">—</div><div class="sl">Critical</div></div>
        </div>
      </div>
    </div>

    <div class="rail-section" id="sec-jobs">
      <div class="rail-hdr" onclick="toggleSection('sec-jobs')">
        <h4>Recent Jobs</h4><span class="toggle" id="tog-sec-jobs">▾</span>
      </div>
      <div class="rail-body">
        <div id="jobsList" style="display:grid;gap:3px;"></div>
      </div>
    </div>

  </div>

  <!-- GRAPH -->
  <div class="canvas-wrap" id="graphWrap">
    <canvas id="graphCanvas"></canvas>
    <div class="graph-search">
      <input id="searchInput" placeholder="Search nodes…"/>
      <select id="typeFilter">
        <option value="">All</option>
        <option value="host">Hosts</option>
        <option value="router">Routers</option>
        <option value="service">Services</option>
        <option value="alert">Alerts</option>
        <option value="subnet">Subnets</option>
      </select>
    </div>
    <div class="graph-tools">
      <button class="gt-btn" id="btnZoomIn">+</button>
      <button class="gt-btn" id="btnZoomOut">−</button>
      <button class="gt-btn" id="btnCenter2">⊕</button>
      <button class="gt-btn" id="btnClearSel">✕</button>
    </div>
  </div>

  <!-- RIGHT DETAIL -->
  <div class="detail-panel" id="detailPanel">
    <div class="dp-hdr">
      <h4 id="detailTitle">No node selected</h4>
      <div class="dp-hdr-actions">
        <button class="btn sm" id="btnDetailRefresh" title="Reload node" style="display:none">↻</button>
      </div>
    </div>
    <div class="dp-scroll" id="detailBody">
      <div class="detail-section">
        <p class="empty-state">Click a node to inspect it.</p>
      </div>
    </div>
  </div>
</div>

<!-- BOTTOM -->
<div class="bottom">
  <div class="bottom-tabs">
    <button class="tab-btn active" data-tab="scanout">Scan Output</button>
    <button class="tab-btn" data-tab="events">Events</button>
    <button class="tab-btn" data-tab="reports">Reports</button>
    <button class="tab-btn" data-tab="sysinfo">Sysinfo</button>
  </div>
  <div class="bottom-content">
    <div class="tab-pane active" id="tab-scanout">
      <div id="scanOutput"></div>
    </div>
    <div class="tab-pane" id="tab-events">
      <div id="eventFeed"></div>
    </div>
    <div class="tab-pane" id="tab-reports">
      <div id="reportsList"></div>
    </div>
    <div class="tab-pane" id="tab-sysinfo">
      <div id="sysinfoContent"><p class="log-line muted">Click ≡ Sysinfo or run Inventory to populate.</p></div>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let snapshot = null;
let selectedNode = null;
let selectedCtx = null;
let panX = 0, panY = 0, scale = 1;
let dragging = false, dragStartX = 0, dragStartY = 0;
let nodePositions = new Map();
let jobPollTimer = null;

const canvas = document.getElementById('graphCanvas');
const ctx2d = canvas.getContext('2d');

// ── Util ──────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function cidr(){ return $('cidrInput').value.trim()||'192.168.0.0/24'; }

function setStatus(label, state='ready'){
  $('statusLabel').textContent = label;
  const dot = $('statusDot');
  dot.className = 'status-pip' + (state==='scanning'?' scanning':state==='error'?' error':'');
}

function addScanLine(text, cls=''){
  const pane = $('scanOutput');
  const div = document.createElement('div');
  div.className = 'log-line'+(cls?' '+cls:'');
  div.textContent = text;
  pane.appendChild(div);
  pane.scrollTop = pane.scrollHeight;
}

function activateTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
}

function toggleSection(id){
  const sec = $(id);
  const tog = $('tog-'+id);
  sec.classList.toggle('collapsed');
  if(tog) tog.textContent = sec.classList.contains('collapsed') ? '▸' : '▾';
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiGet(path){ const r=await fetch(path); if(!r.ok) throw new Error(r.status); return r.json(); }
async function apiPost(path){ const r=await fetch(path,{method:'POST'}); if(!r.ok) throw new Error(r.status); return r.json(); }

async function fetchGraph(){
  try{
    setStatus('loading…','scanning');
    const data = await apiGet('/api/graph');
    snapshot = data;
    updateStats(data.stats||{});
    renderGraph();
    renderEvents(data.events||[]);
    setStatus('ready','ready');
    autoFitGraph();
  } catch(e){ setStatus('error','error'); console.error('fetchGraph',e); }
}

async function fetchReports(){
  try{
    const data = await apiGet('/api/reports');
    renderReports(data.reports||[]);
  } catch(e){}
}

async function fetchNode(id){
  try{
    const data = await apiGet('/api/node/'+encodeURIComponent(id));
    selectedCtx = data;
    renderDetail(data.node, data.neighbors||[], data.events||[]);
    $('btnDetailRefresh').style.display='';
    $('btnDetailRefresh').onclick=()=>fetchNode(id);
  } catch(e){ console.error('fetchNode',e); }
}

async function fetchJobs(){
  try{
    const data = await apiGet('/api/jobs');
    renderJobsList(data.jobs||[]);
  } catch(e){}
}

async function fetchSysinfo(){
  try{
    const data = await apiGet('/api/sysinfo');
    renderSysinfo(data);
    activateTab('sysinfo');
  } catch(e){ $('sysinfoContent').innerHTML='<p class="log-line err">Failed to fetch sysinfo</p>'; }
}

async function pollJob(jid){
  try{
    const job = await apiGet('/api/jobs/'+jid);
    const lines = job.lines||[];
    const pane = $('scanOutput');
    pane.innerHTML='';
    lines.forEach(l=>{
      const cls = l.includes('ERROR')?'err':l.includes('ROGUE')||l.includes('rogue')?'warn':
                  l.includes('complete')||l.includes('done')?'ok':
                  l.includes('→')||l.includes('Starting')?'muted':'';
      const d=document.createElement('div');
      d.className='log-line'+(cls?' '+cls:'');d.textContent=l;pane.appendChild(d);
    });
    pane.scrollTop=pane.scrollHeight;
    fetchJobs();
    if(job.status==='running'){
      jobPollTimer=setTimeout(()=>pollJob(jid),700);
    } else {
      setStatus(job.status==='done'?'done':'error', job.status==='done'?'ready':'error');
      if(job.status==='done') setTimeout(fetchGraph, 500);
      if(job.op==='inventory' && job.result) renderSysinfo(job.result);
    }
  } catch(e){ clearTimeout(jobPollTimer); setStatus('error','error'); }
}

async function runOp(endpoint){
  if(jobPollTimer) clearTimeout(jobPollTimer);
  $('scanOutput').innerHTML='';
  activateTab('scanout');
  setStatus('scanning…','scanning');
  addScanLine('→ POST '+endpoint,'muted');
  try{
    const res=await apiPost(endpoint);
    if(res.job_id){
      jobPollTimer=setTimeout(()=>pollJob(res.job_id),500);
    }
  } catch(e){ addScanLine('ERROR: '+e,'err'); setStatus('error','error'); }
}

// ── Render Stats ──────────────────────────────────────────────────────────────
function updateStats(s){
  $('statHosts').textContent = s.hosts??'—';
  $('statWarn').textContent  = s.warning_nodes??'—';
  $('statCrit').textContent  = s.critical_nodes??'—';
  const nodes = snapshot?.nodes||[];
  $('statSvc').textContent = nodes.filter(n=>n.node_type==='service').length||'—';
}

// ── Render Jobs ───────────────────────────────────────────────────────────────
function renderJobsList(jobs){
  const wrap=$('jobsList');
  wrap.innerHTML='';
  if(!jobs.length){
    wrap.innerHTML='<div class="log-line muted" style="font-size:10px;padding:2px 0;">No jobs yet.</div>';
    return;
  }
  jobs.slice(0,7).forEach(j=>{
    const d=document.createElement('button');
    d.className='op-btn'+(j.status==='running'?' active':'');
    const bc=j.status==='running'?'run':j.status==='done'?'ok':j.status==='error'?'err':'';
    d.innerHTML=`<span class="lbl" style="font-size:10px;">${esc(j.op)}</span><span class="badge ${bc}">${esc(j.status)}</span>`;
    d.onclick=()=>{
      if(jobPollTimer) clearTimeout(jobPollTimer);
      jobPollTimer=setTimeout(()=>pollJob(j.id),0);
      activateTab('scanout');
    };
    wrap.appendChild(d);
  });
}

// ── Render Events ─────────────────────────────────────────────────────────────
function renderEvents(events){
  const wrap=$('eventFeed');
  wrap.innerHTML='';
  if(!events.length){wrap.innerHTML='<p class="log-line muted">No events.</p>';return;}
  events.slice(0,50).forEach(e=>{
    const d=document.createElement('div');
    d.className='feed-row';
    const ts = e.ts ? e.ts.replace('T',' ').replace('Z','') : '';
    d.innerHTML=`
      <div class="fhdr">
        <span class="et sev-${esc(e.severity)}">${esc(e.severity)}</span>
        <span class="ft">${esc(ts)}</span>
        <strong style="font-size:11px;">${esc(e.title)}</strong>
      </div>
      <div class="fs">${esc(e.summary)}</div>`;
    if(e.node_id){
      d.style.cursor='pointer';
      d.onclick=()=>{
        const n=snapshot?.nodes?.find(x=>x.id===e.node_id);
        if(n){selectedNode=n;fetchNode(n.id);renderGraph();}
      };
    }
    wrap.appendChild(d);
  });
}

// ── Render Reports ────────────────────────────────────────────────────────────
function renderReports(reports){
  const wrap=$('reportsList');
  wrap.innerHTML='';
  if(!reports.length){wrap.innerHTML='<div class="log-line muted">No reports.</div>';return;}
  reports.forEach(r=>{
    const d=document.createElement('div');
    d.className='log-line';
    const kb=(r.size/1024).toFixed(1);
    const date=new Date(r.modified*1000).toLocaleString();
    d.textContent=`${r.name}  ${kb}kb  ${date}`;
    wrap.appendChild(d);
  });
}

// ── Render Sysinfo ────────────────────────────────────────────────────────────
function renderSysinfo(info){
  const wrap=$('sysinfoContent');
  const cpu = info.cpu_percent??null;
  const ram = info.ram_percent??null;
  const disk = info.disk_percent??null;
  const cpuCls = cpu>85?'warn':cpu>60?'warn':'ok';
  const ramCls = ram>85?'warn':ram>60?'warn':'ok';
  const diskCls = disk>90?'warn':disk>75?'warn':'ok';

  const ifaces = info.interfaces||{};
  const ifaceHtml = Object.entries(ifaces).map(([iface,ips])=>
    `<div class="iface-row">${esc(iface)}: <span>${esc(ips.join(', '))}</span></div>`
  ).join('') || '<div class="iface-row">—</div>';

  wrap.innerHTML=`
    <div class="sysinfo-grid">
      <div class="sysinfo-card">
        <div class="sc-label">Hostname</div>
        <div class="sc-value" style="font-size:12px;">${esc(info.hostname||'—')}</div>
      </div>
      <div class="sysinfo-card">
        <div class="sc-label">CPU</div>
        <div class="sc-value ${cpuCls}">${cpu!==null?cpu+'%':'—'}</div>
        ${cpu!==null?`<div class="bar-bg"><div class="bar-fg" style="width:${cpu}%;background:${cpu>85?'var(--warn)':'var(--ok)'};"></div></div>`:''}
      </div>
      <div class="sysinfo-card">
        <div class="sc-label">RAM</div>
        <div class="sc-value ${ramCls}">${ram!==null?info.ram_used_mb+'mb / '+info.ram_total_mb+'mb':'—'}</div>
        ${ram!==null?`<div class="bar-bg"><div class="bar-fg" style="width:${ram}%;background:${ram>85?'var(--warn)':'var(--ok)'};"></div></div>`:''}
      </div>
      <div class="sysinfo-card">
        <div class="sc-label">Disk /</div>
        <div class="sc-value ${diskCls}">${disk!==null?info.disk_used_gb+'gb / '+info.disk_total_gb+'gb':'—'}</div>
        ${disk!==null?`<div class="bar-bg"><div class="bar-fg" style="width:${disk}%;background:${disk>90?'var(--warn)':'var(--ok)'};"></div></div>`:''}
      </div>
    </div>
    <div style="padding:6px 0 4px;">
      <div class="sc-label" style="font-size:9px;color:var(--muted);margin-bottom:4px;">INTERFACES</div>
      ${ifaceHtml}
    </div>
    ${info.uname?`<div class="log-line muted" style="padding:4px 0;">${esc(info.uname)}</div>`:''}
  `;

  // Auto-detect CIDR from interfaces
  const ips = Object.values(ifaces).flat();
  for(const ip of ips){
    if(ip && !ip.startsWith('127.')){
      const parts = ip.split('.');
      if(parts.length===4){
        const cidrVal = parts.slice(0,3).join('.')+'.0/24';
        if($('cidrInput').value==='192.168.0.0/24'||$('cidrInput').value===''){
          $('cidrInput').value = cidrVal;
        }
      }
    }
  }
}

// ── Render Detail Panel ───────────────────────────────────────────────────────
function renderDetail(node, neighbors, events){
  $('detailTitle').textContent = node.label || node.id;
  const riskColor = node.risk_score>=70?'red':node.risk_score>=35?'warn':'ok';
  const riskHex   = node.risk_score>=70?'#d61f2c':node.risk_score>=35?'#c97b00':'#2a9d4e';
  const services  = (node.meta?.services)||[];
  const mac = node.mac || node.meta?.mac || null;
  const vendor = node.meta?.vendor || null;
  const iface = node.meta?.interface || null;
  const source = node.meta?.source || null;
  const neighborState = node.meta?.neighbor_state || null;

  let svcHtml='<p class="empty-state">No service data. Run service scan.</p>';
  if(services.length){
    svcHtml=`<table class="svc-table">
      <thead><tr><th>Port</th><th>Proto</th><th>Service</th><th>Product</th><th>Ver</th></tr></thead>
      <tbody>`+services.map(s=>`
        <tr>
          <td>${esc(s.port)}</td>
          <td>${esc((s.protocol||'tcp').toUpperCase())}</td>
          <td>${esc(s.service_name||'')}</td>
          <td>${esc(s.product||'')}</td>
          <td>${esc(s.version||'')}</td>
        </tr>`).join('')+`</tbody></table>`;
  }

  let neighborHtml='<p class="empty-state">No neighbors.</p>';
  if(neighbors.length){
    neighborHtml=neighbors.map(n=>`<span class="neighbor-chip" data-id="${esc(n.id)}">${esc(n.label)}</span>`).join('');
  }

  let evtHtml='<p class="empty-state">No events.</p>';
  if(events.length){
    evtHtml=events.slice(0,8).map(e=>`
      <div class="evt-row">
        <div class="et sev-${esc(e.severity)}">${esc(e.severity)} — ${esc(e.title)}</div>
        <div class="es">${esc(e.summary)}</div>
        <div class="es">${esc((e.ts||'').replace('T',' ').replace('Z',''))}</div>
      </div>`).join('');
  }

  // Source modules
  const sources = new Set();
  if(source) sources.add(source);
  if(neighborState) sources.add('arp');
  services.forEach(s=>{ if(s.source) sources.add(s.source); });
  const srcHtml = sources.size
    ? [...sources].map(s=>`<span class="src-tag">${esc(s)}</span>`).join('')
    : '<span class="src-tag" style="background:rgba(120,120,120,.1);border-color:rgba(120,120,120,.2);color:var(--muted);">unknown</span>';

  $('detailBody').innerHTML=`
    <div class="detail-section">
      <h5>Identity</h5>
      <div class="kv"><div class="k">type</div><div class="v">${esc(node.node_type)}</div></div>
      <div class="kv"><div class="k">ip</div><div class="v">${esc(node.ip||'—')}</div></div>
      <div class="kv"><div class="k">hostname</div><div class="v">${esc(node.hostname||'—')}</div></div>
      <div class="kv"><div class="k">mac</div><div class="v">${esc(mac||'—')}</div></div>
      ${vendor?`<div class="kv"><div class="k">vendor</div><div class="v">${esc(vendor)}</div></div>`:''}
      ${iface?`<div class="kv"><div class="k">interface</div><div class="v">${esc(iface)}</div></div>`:''}
      ${neighborState?`<div class="kv"><div class="k">arp state</div><div class="v ${neighborState.toUpperCase()==='STALE'?'warn':''}">${esc(neighborState)}</div></div>`:''}
      <div class="kv"><div class="k">group</div><div class="v">${esc(node.group||'—')}</div></div>
    </div>
    <div class="detail-section">
      <h5>Risk</h5>
      <div class="kv"><div class="k">score</div><div class="v ${riskColor}">${esc(String(node.risk_score??0))} / 100</div></div>
      <div class="kv"><div class="k">status</div><div class="v ${riskColor}">${esc(node.status)}</div></div>
      <div class="risk-bar"><div class="risk-fill" style="width:${node.risk_score||0}%;background:${riskHex};"></div></div>
    </div>
    <div class="detail-section">
      <h5>Services (${services.length})</h5>
      ${svcHtml}
      ${(node.node_type==='host'&&node.ip)?`<button class="scan-btn-node" id="btnScanSvcNode">▶ Scan Services on ${esc(node.ip)}</button>`:''}
    </div>
    <div class="detail-section">
      <h5>Neighbors (${neighbors.length})</h5>
      <div id="neighborChips">${neighborHtml}</div>
    </div>
    <div class="detail-section">
      <h5>Events</h5>
      ${evtHtml}
    </div>
    <div class="detail-section">
      <h5>Source Modules</h5>
      <div>${srcHtml}</div>
    </div>
  `;

  document.querySelectorAll('.neighbor-chip').forEach(chip=>{
    chip.addEventListener('click',()=>{
      const n=snapshot?.nodes?.find(x=>x.id===chip.dataset.id);
      if(n){selectedNode=n;fetchNode(n.id);renderGraph();}
    });
  });

  const ssBtn=$('btnScanSvcNode');
  if(ssBtn){
    ssBtn.addEventListener('click',async()=>{
      ssBtn.disabled=true;ssBtn.textContent='Scanning…';
      await runOp('/api/scan/services/'+encodeURIComponent(node.ip));
      ssBtn.disabled=false;ssBtn.textContent='▶ Scan Services on '+node.ip;
      await fetchNode(node.id);
    });
  }
}

function clearDetail(){
  selectedNode=null;selectedCtx=null;
  $('detailTitle').textContent='No node selected';
  $('btnDetailRefresh').style.display='none';
  $('detailBody').innerHTML='<div class="detail-section"><p class="empty-state">Click a node to inspect it.</p></div>';
  renderGraph();
}

// ── Auto-fit ─────────────────────────────────────────────────────────────────
function autoFitGraph(){
  if(!snapshot||!canvas.width) return;
  const nodes=snapshot.nodes||[];
  if(!nodes.length) return;
  const laidOut=layoutNodes(getFilteredNodes(nodes),canvas.width,canvas.height);
  if(!laidOut.length) return;
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  laidOut.forEach(n=>{
    minX=Math.min(minX,n.x); maxX=Math.max(maxX,n.x);
    minY=Math.min(minY,n.y); maxY=Math.max(maxY,n.y);
  });
  const pw=canvas.width, ph=canvas.height;
  const gw=Math.max(maxX-minX,1), gh=Math.max(maxY-minY,1);
  const pad=80;
  const s=Math.min((pw-pad*2)/gw,(ph-pad*2)/gh,2.5);
  scale=Math.max(0.3,Math.min(s,1.5));
  panX=(pw/2)-((minX+maxX)/2)*scale;
  panY=(ph/2)-((minY+maxY)/2)*scale;
  renderGraph();
}

// ── Graph ─────────────────────────────────────────────────────────────────────
function resizeCanvas(){
  const wrap=$('graphWrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  renderGraph();
}

function getFilteredNodes(nodes){
  const q=$('searchInput').value.trim().toLowerCase();
  const t=$('typeFilter').value;
  return nodes.filter(n=>{
    if(q&&!`${n.label} ${n.id} ${n.ip||''} ${n.hostname||''}`.toLowerCase().includes(q)) return false;
    if(t&&n.node_type!==t) return false;
    return true;
  });
}

function layoutNodes(nodes, w, h){
  const subnets=nodes.filter(n=>n.node_type==='subnet');
  const others=nodes.filter(n=>n.node_type!=='subnet');
  // Grid: prefer square-ish, max 3 cols
  const cols=Math.min(3,Math.max(1,Math.ceil(Math.sqrt(subnets.length))));
  const rows=Math.max(1,Math.ceil(subnets.length/cols));
  // Padding so nodes don't hit edges
  const padX=160, padY=120;
  const cellW=(w-padX*2)/Math.max(cols,1);
  const cellH=(h-padY*2)/Math.max(rows,1);
  const subnetPos=new Map();
  subnets.forEach((n,i)=>{
    const c=i%cols, r=Math.floor(i/cols);
    subnetPos.set(n.id,{x:padX+cellW*(c+0.5), y:padY+cellH*(r+0.5)});
  });
  const positioned=[];
  subnets.forEach(n=>{
    const p=subnetPos.get(n.id)||{x:w/2,y:h/2};
    positioned.push({...n,...p});
  });
  const buckets=new Map();
  others.forEach(n=>{
    const sid=n.group?`subnet:${n.group}`:'subnet:unknown';
    if(!buckets.has(sid)) buckets.set(sid,[]);
    buckets.get(sid).push(n);
  });
  for(const[sid,items] of buckets){
    const center=subnetPos.get(sid)||{x:w/2,y:h/2};
    const ifaces=items.filter(n=>n.node_type==='interface');
    const rest=items.filter(n=>n.node_type!=='interface');
    ifaces.forEach((n,i)=>{
      const a=(-Math.PI/2)+(i*0.85);
      positioned.push({...n,x:center.x+Math.cos(a)*80,y:center.y+Math.sin(a)*80});
    });
    // Spiral outward so dense subnets don't all stack
    rest.forEach((n,i)=>{
      const a=(Math.PI*2*i)/Math.max(rest.length,1)-(Math.PI/2);
      const baseR=Math.min(160,60+rest.length*12);
      const r=baseR+(Math.floor(i/8)*40);
      positioned.push({...n,x:center.x+Math.cos(a)*r,y:center.y+Math.sin(a)*r});
    });
  }
  return positioned;
}

function nodeRadius(n){
  if(n.node_type==='subnet')    return 30;
  if(n.node_type==='router')    return 18;
  if(n.node_type==='alert')     return 14;
  if(n.node_type==='service')   return 9;
  if(n.node_type==='interface') return 8;
  return 13;
}

function nodeColor(n){
  if(n.node_type==='alert'||n.status==='critical') return{fill:'#d61f2c',stroke:'#a00'};
  if(n.status==='warning') return{fill:'#c97b00',stroke:'#a06000'};
  if(n.node_type==='router') return{fill:'#8b3dd6',stroke:'#6b2db0'};
  if(n.node_type==='service') return{fill:'#2a7a4e',stroke:'#1a5a3a'};
  if(n.node_type==='interface') return{fill:'#444',stroke:'#333'};
  if(n.node_type==='subnet') return{fill:'rgba(42,42,64,.25)',stroke:'#2a2a50'};
  return{fill:'#3b7ecf',stroke:'#2a5fa0'};
}

function renderGraph(){
  if(!canvas.width||!canvas.height) return;
  const c=ctx2d;
  c.clearRect(0,0,canvas.width,canvas.height);
  const nodes=snapshot?getFilteredNodes(snapshot.nodes||[]):[];
  const allEdges=snapshot?.edges||[];
  const visIds=new Set(nodes.map(n=>n.id));
  const edges=allEdges.filter(e=>visIds.has(e.source)&&visIds.has(e.target));
  const laidOut=layoutNodes(nodes,canvas.width/scale,canvas.height/scale);
  nodePositions.clear();
  laidOut.forEach(n=>nodePositions.set(n.id,{x:n.x,y:n.y,data:n}));
  const neighborIds=new Set(selectedCtx?.neighbors?.map(n=>n.id)||[]);

  c.save();
  c.translate(panX,panY);
  c.scale(scale,scale);

  // Edges
  edges.forEach(e=>{
    const sp=nodePositions.get(e.source),tp=nodePositions.get(e.target);
    if(!sp||!tp) return;
    const isHighlight=selectedNode&&(e.source===selectedNode.id||e.target===selectedNode.id);
    const isDim=selectedNode&&!isHighlight;
    c.beginPath();
    c.moveTo(sp.x,sp.y);c.lineTo(tp.x,tp.y);
    c.setLineDash(e.edge_type==='contains'?[3,4]:[]);
    c.strokeStyle=isDim?'rgba(42,42,64,.15)':isHighlight?'#d61f2c':
      e.status==='critical'?'rgba(214,31,44,.6)':
      e.status==='warning'?'rgba(201,123,0,.45)':'#252538';
    c.lineWidth=isHighlight?1.5:1;
    c.globalAlpha=isDim?.12:1;
    c.stroke();
    c.setLineDash([]);c.globalAlpha=1;
  });

  // Nodes
  laidOut.forEach(n=>{
    const r=nodeRadius(n);
    const col=nodeColor(n);
    const isSelected=selectedNode?.id===n.id;
    const isNeighbor=neighborIds.has(n.id);
    const isDim=selectedNode&&!isSelected&&!isNeighbor;
    c.globalAlpha=isDim?.2:1;

    if(n.node_type==='subnet'){
      c.beginPath();c.arc(n.x,n.y,r,0,Math.PI*2);
      c.fillStyle='rgba(42,42,64,.15)';c.fill();
      c.setLineDash([5,4]);
      c.strokeStyle=isSelected?'#d61f2c':'#2a2a50';
      c.lineWidth=isSelected?2:1.5;
      c.stroke();c.setLineDash([]);
    } else {
      if(isSelected){
        c.beginPath();c.arc(n.x,n.y,r+5,0,Math.PI*2);
        c.strokeStyle='rgba(214,31,44,.35)';c.lineWidth=1.5;c.stroke();
      }
      c.beginPath();c.arc(n.x,n.y,r,0,Math.PI*2);
      c.fillStyle=col.fill;c.fill();
      c.strokeStyle=isSelected?'#ff4455':col.stroke;
      c.lineWidth=isSelected?1.5:1;c.stroke();
    }

    c.globalAlpha=isDim?.18:1;
    c.fillStyle=isSelected?'#f0f1f3':'#7a8090';
    c.font=(isSelected?'700 ':'')+'9px JetBrains Mono, monospace';
    c.textAlign='center';
    const label=n.label.length>20?n.label.slice(0,18)+'…':n.label;
    c.fillText(label,n.x,n.y+r+11);
    c.globalAlpha=1;
  });

  c.restore();
}

// ── Canvas Events ─────────────────────────────────────────────────────────────
function canvasXY(e){
  const rect=canvas.getBoundingClientRect();
  return{x:(e.clientX-rect.left-panX)/scale,y:(e.clientY-rect.top-panY)/scale};
}

canvas.addEventListener('click',e=>{
  const{x,y}=canvasXY(e);
  let hit=null;
  for(const[id,pos] of nodePositions){
    const r=nodeRadius(pos.data)+5;
    if(Math.hypot(x-pos.x,y-pos.y)<r){hit=pos.data;break;}
  }
  if(hit){selectedNode=hit;fetchNode(hit.id);renderGraph();}
  else{clearDetail();}
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:.91;
  scale=Math.max(.25,Math.min(4,scale*f));
  renderGraph();
},{passive:false});

canvas.addEventListener('mousedown',e=>{dragging=true;dragStartX=e.clientX-panX;dragStartY=e.clientY-panY;});
window.addEventListener('mousemove',e=>{if(!dragging)return;panX=e.clientX-dragStartX;panY=e.clientY-dragStartY;renderGraph();});
window.addEventListener('mouseup',()=>{dragging=false;});

// ── Button Wiring ─────────────────────────────────────────────────────────────
$('btnRefresh').onclick=fetchGraph;
$('btnCenter').onclick=$('btnCenter2').onclick=()=>{panX=0;panY=0;scale=1;renderGraph();};
$('btnClearSel').onclick=clearDetail;
$('btnZoomIn').onclick=()=>{scale=Math.min(4,scale*1.2);renderGraph();};
$('btnZoomOut').onclick=()=>{scale=Math.max(.25,scale/1.2);renderGraph();};
$('btnDiscovery').onclick=()=>runOp('/api/scan/discovery?cidr='+encodeURIComponent(cidr()));
$('btnArp').onclick=()=>runOp('/api/scan/arp');
$('btnHostmap').onclick=()=>runOp('/api/scan/hostmap?cidr='+encodeURIComponent(cidr()));
$('btnRogue').onclick=()=>runOp('/api/scan/rogue?cidr='+encodeURIComponent(cidr()));
$('btnInventory').onclick=()=>runOp('/api/scan/inventory');
$('btnSysinfo').onclick=fetchSysinfo;
$('searchInput').oninput=renderGraph;
$('typeFilter').onchange=renderGraph;
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>activateTab(b.dataset.tab));
window.addEventListener('resize',resizeCanvas);

// ── Init ──────────────────────────────────────────────────────────────────────
resizeCanvas();
fetchGraph();
fetchReports();
fetchJobs();
fetchSysinfo();
setInterval(fetchGraph,20000);
setInterval(fetchJobs,4000);
</script>
