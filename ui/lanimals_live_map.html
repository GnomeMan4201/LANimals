<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>LANimals</title>
<style>
:root{
  --bg:#0b0b0d;--panel:#111115;--panel2:#17171d;--border:#252530;
  --text:#f0f1f3;--muted:#7a8090;--red:#d61f2c;--red2:#a6111b;--red3:#ff4455;
  --warn:#c97b00;--ok:#2a9d4e;--info:#3b7ecf;
  --font:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:13px;overflow:hidden;}
body{display:grid;grid-template-rows:48px 1fr 200px;}
.topbar{display:grid;grid-template-columns:auto 1fr auto;align-items:center;gap:16px;padding:0 16px;border-bottom:1px solid var(--border);background:#0d0d11;z-index:10;}
.brand{font-size:20px;font-weight:900;letter-spacing:.04em;user-select:none;white-space:nowrap;}
.brand span.LA{color:var(--red);}
.brand span.Nimals{color:var(--text);}
.topbar-center{display:flex;align-items:center;gap:10px;min-width:0;}
.scope-label{color:var(--muted);font-size:10px;white-space:nowrap;}
#cidrInput{background:#0b0b0d;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:4px 9px;width:150px;font-family:var(--font);font-size:12px;}
#cidrInput:focus{outline:none;border-color:var(--red);}
.topbar-right{display:flex;gap:6px;align-items:center;}
.status-pip{width:7px;height:7px;border-radius:50%;background:var(--ok);flex-shrink:0;}
.status-pip.scanning{background:var(--warn);animation:pulse .8s infinite;}
.status-pip.error{background:var(--red3);}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.25;}}
#statusLabel{color:var(--muted);font-size:10px;}
.main{display:grid;grid-template-columns:240px 1fr 340px;min-height:0;overflow:hidden;}
.rail{background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;min-height:0;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.rail-section{border-bottom:1px solid var(--border);padding:10px 12px;}
.rail-section.collapsed .rail-body{display:none;}
.rail-hdr{display:flex;align-items:center;justify-content:space-between;cursor:pointer;user-select:none;margin-bottom:8px;}
.rail-hdr h4{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.rail-hdr .toggle{font-size:10px;color:var(--muted);}
.rail-section.collapsed .rail-hdr{margin-bottom:0;}
.op-btn{display:flex;align-items:center;gap:7px;width:100%;background:var(--panel2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:7px 9px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:600;margin-bottom:5px;transition:border-color .12s,background .12s;text-align:left;}
.op-btn:last-child{margin-bottom:0;}
.op-btn:hover{border-color:var(--red);}
.op-btn:disabled{opacity:.35;cursor:not-allowed;}
.op-btn.primary{background:rgba(214,31,44,.14);border-color:var(--red2);}
.op-btn.primary:hover{background:rgba(214,31,44,.24);}
.op-btn.active{border-color:var(--info);background:rgba(59,126,207,.1);}
.op-btn .icon{font-size:13px;flex-shrink:0;width:16px;text-align:center;}
.op-btn .lbl{flex:1;}
.op-btn .badge{font-size:9px;background:var(--border);border-radius:3px;padding:1px 4px;color:var(--muted);}
.op-btn .badge.warn{background:rgba(201,123,0,.2);color:var(--warn);}
.op-btn .badge.ok{background:rgba(42,157,78,.2);color:var(--ok);}
.op-btn .badge.run{background:rgba(59,126,207,.2);color:var(--info);}
.op-btn .badge.err{background:rgba(214,31,44,.2);color:var(--red3);}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.stat{background:var(--panel2);border:1px solid var(--border);border-radius:5px;padding:7px 9px;}
.stat .sv{font-size:18px;font-weight:800;line-height:1;}
.stat .sl{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:2px;}
.stat .sv.red{color:var(--red3);}
.stat .sv.warn{color:var(--warn);}
.stat .sv.ok{color:var(--ok);}
.canvas-wrap{position:relative;background:radial-gradient(ellipse at center,rgba(214,31,44,.035),transparent 65%),var(--bg);min-height:0;overflow:hidden;}
canvas#graphCanvas{width:100%;height:100%;display:block;}
.graph-tools{position:absolute;bottom:10px;right:10px;display:flex;gap:5px;}
.gt-btn{background:rgba(17,17,21,.88);border:1px solid var(--border);border-radius:5px;color:var(--muted);padding:5px 9px;cursor:pointer;font-family:var(--font);font-size:11px;backdrop-filter:blur(4px);}
.gt-btn:hover{border-color:var(--red);color:var(--text);}
.graph-search{position:absolute;top:10px;left:10px;display:flex;gap:5px;}
.graph-search input,.graph-search select{background:rgba(17,17,21,.9);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:5px 9px;font-family:var(--font);font-size:11px;backdrop-filter:blur(4px);}
.graph-search input{width:140px;}
.graph-search input:focus,.graph-search select:focus{outline:none;border-color:var(--red);}
.detail-panel{background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;min-height:0;}
.dp-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px 8px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--panel);z-index:1;flex-shrink:0;}
.dp-hdr h4{font-size:10px;text-transform:uppercase;letter-spacing:.1em;color:var(--muted);}
.dp-hdr-actions{display:flex;gap:4px;}
.dp-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.detail-section{padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.04);}
.detail-section h5{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px;}
.kv{display:grid;grid-template-columns:88px 1fr;gap:2px 6px;align-items:baseline;margin-bottom:1px;}
.kv .k{color:var(--muted);font-size:10px;}
.kv .v{color:var(--text);font-size:11px;word-break:break-all;}
.kv .v.red{color:var(--red3);}
.kv .v.warn{color:var(--warn);}
.kv .v.ok{color:var(--ok);}
.kv .v.info{color:var(--info);}
.risk-bar{height:3px;border-radius:2px;background:var(--border);margin-top:5px;}
.risk-fill{height:100%;border-radius:2px;transition:width .3s;}
.svc-table{width:100%;border-collapse:collapse;font-size:10px;}
.svc-table th{color:var(--muted);font-weight:600;text-align:left;padding:2px 3px;border-bottom:1px solid var(--border);}
.svc-table td{padding:2px 3px;border-bottom:1px solid rgba(255,255,255,.025);font-family:var(--font);}
.svc-table tr:hover td{background:rgba(255,255,255,.025);}
.neighbor-chip{display:inline-flex;align-items:center;gap:3px;background:var(--panel2);border:1px solid var(--border);border-radius:3px;padding:2px 6px;font-size:10px;cursor:pointer;margin:2px;}
.neighbor-chip:hover{border-color:var(--red);}
.evt-row{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.025);}
.evt-row .et{font-size:9px;font-weight:700;text-transform:uppercase;margin-bottom:1px;}
.evt-row .es{color:var(--muted);font-size:10px;}
.sev-info{color:var(--info);}
.sev-warning{color:var(--warn);}
.sev-critical,.sev-high{color:var(--red3);}
.sev-ok,.sev-normal{color:var(--ok);}
.scan-btn-node{width:100%;background:rgba(214,31,44,.12);border:1px solid var(--red2);border-radius:5px;color:var(--text);padding:7px;cursor:pointer;font-family:var(--font);font-size:11px;font-weight:700;margin-top:5px;}
.scan-btn-node:hover{background:rgba(214,31,44,.22);}
.scan-btn-node:disabled{opacity:.4;cursor:not-allowed;}
.empty-state{color:var(--muted);font-size:11px;padding:4px 0;}
.src-tag{display:inline-block;background:rgba(59,126,207,.15);border:1px solid rgba(59,126,207,.3);border-radius:3px;padding:1px 5px;font-size:9px;color:var(--info);margin:1px;}
.timeline-row{display:flex;gap:8px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.025);font-size:10px;}
.timeline-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.timeline-dot.info{background:var(--info);}
.timeline-dot.warning{background:var(--warn);}
.timeline-dot.critical,.timeline-dot.high{background:var(--red3);}
.timeline-dot.normal,.timeline-dot.ok{background:var(--ok);}
.timeline-ts{color:var(--muted);white-space:nowrap;font-size:9px;}
.timeline-title{color:var(--text);flex:1;}
.bottom{border-top:1px solid var(--border);background:#0d0d11;display:grid;grid-template-rows:32px 1fr;min-height:0;}
.bottom-tabs{display:flex;align-items:stretch;border-bottom:1px solid var(--border);padding:0 12px;gap:2px;flex-shrink:0;}
.tab-btn{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);cursor:pointer;font-family:var(--font);font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:0 9px;}
.tab-btn.active{color:var(--text);border-bottom-color:var(--red);}
.tab-btn:hover{color:var(--text);}
.bottom-content{min-height:0;overflow:hidden;position:relative;}
.tab-pane{position:absolute;inset:0;overflow-y:auto;padding:6px 12px;display:none;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.tab-pane.active{display:block;}
.log-line{font-size:10px;font-family:var(--font);line-height:1.65;white-space:pre-wrap;word-break:break-all;color:var(--text);}
.log-line.err{color:var(--red3);}
.log-line.warn{color:var(--warn);}
.log-line.ok{color:var(--ok);}
.log-line.muted{color:var(--muted);}
.feed-row{padding:4px 0;border-bottom:1px solid rgba(255,255,255,.025);}
.feed-row .fhdr{display:flex;align-items:baseline;gap:7px;margin-bottom:1px;}
.feed-row .ft{font-size:9px;color:var(--muted);}
.feed-row .fs{font-size:10px;color:var(--muted);}
.sysinfo-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:4px 0;}
.sysinfo-card{background:var(--panel);border:1px solid var(--border);border-radius:5px;padding:8px 10px;}
.sysinfo-card .sc-label{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;}
.sysinfo-card .sc-value{font-size:14px;font-weight:800;}
.sysinfo-card .sc-value.ok{color:var(--ok);}
.sysinfo-card .sc-value.warn{color:var(--warn);}
.bar-bg{height:3px;background:var(--border);border-radius:2px;margin-top:5px;}
.bar-fg{height:100%;border-radius:2px;}
.iface-row{font-size:10px;padding:2px 0;color:var(--muted);}
.iface-row span{color:var(--text);}
.notes-area{width:100%;background:#0b0b0d;color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 8px;font-family:var(--font);font-size:11px;resize:vertical;min-height:52px;margin-top:4px;}
.notes-area:focus{outline:none;border-color:var(--red);}
.notes-save{width:100%;background:rgba(59,126,207,.15);border:1px solid rgba(59,126,207,.3);border-radius:5px;color:var(--text);padding:6px;cursor:pointer;font-family:var(--font);font-size:11px;margin-top:4px;}
.notes-save:hover{background:rgba(59,126,207,.28);}
.vt-btn{width:100%;background:rgba(42,157,78,.12);border:1px solid rgba(42,157,78,.3);border-radius:5px;color:var(--text);padding:6px;cursor:pointer;font-family:var(--font);font-size:11px;margin-top:4px;}
.vt-btn:hover{background:rgba(42,157,78,.22);}
.vt-result{font-size:10px;padding:6px 0;color:var(--muted);}
.vt-result .mal{color:var(--red3);}
.vt-result .ok{color:var(--ok);}
.cve-btn{width:100%;background:rgba(214,31,44,.12);border:1px solid var(--red2);border-radius:5px;color:var(--text);padding:6px;cursor:pointer;font-family:var(--font);font-size:11px;margin-top:4px;}
.cve-btn:hover{background:rgba(214,31,44,.22);}
.cve-row{font-size:10px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.025);}
.risk-reason{font-size:10px;color:var(--muted);padding:1px 0;}
.risk-reason::before{content:'• ';color:var(--warn);}
button{cursor:pointer;font-family:var(--font);}
.btn{background:var(--panel2);border:1px solid var(--border);border-radius:5px;color:var(--text);padding:5px 10px;font-size:11px;font-weight:600;}
.btn:hover{border-color:var(--red);}
.btn.sm{padding:3px 7px;font-size:10px;}
/* hosts table */
.hosts-table{width:100%;border-collapse:collapse;font-size:10px;}
.hosts-table th{color:var(--muted);font-weight:600;text-align:left;padding:3px 5px;border-bottom:1px solid var(--border);font-size:9px;text-transform:uppercase;letter-spacing:.06em;}
.hosts-table td{padding:3px 5px;border-bottom:1px solid rgba(255,255,255,.025);}
.hosts-table tr{cursor:pointer;}
.hosts-table tr:hover td{background:rgba(255,255,255,.03);}
.hosts-table .status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:4px;}
</style>
</head>
<body>
<div class="topbar">
  <div class="brand"><span class="LA">LAN</span><span class="Nimals">imals</span></div>
  <div class="topbar-center">
    <span class="scope-label">CIDR</span>
    <input id="cidrInput" value="192.168.0.0/24" placeholder="192.168.0.0/24"/>
    <div class="status-pip" id="statusDot"></div>
    <span id="statusLabel">ready</span>
  </div>
  <div class="topbar-right">
    <button class="btn sm" id="btnRefresh">↻ Refresh</button>
    <button class="btn sm" id="btnCenter">⊕ Center</button>
    <button class="btn sm" id="btnSysinfo">≡ Sysinfo</button>
    <button class="btn sm" id="btnReport" title="Export HTML report">⬇ Report</button>
  </div>
</div>
<div class="main">
  <div class="rail">
    <div class="rail-section" id="sec-ops">
      <div class="rail-hdr" onclick="toggleSection('sec-ops')">
        <h4>Operations</h4><span class="toggle" id="tog-sec-ops">▾</span>
      </div>
      <div class="rail-body">
        <button class="op-btn primary" id="btnDiscovery"><span class="icon">◎</span><span class="lbl">Discovery Scan</span></button>
        <button class="op-btn" id="btnArp"><span class="icon">⬡</span><span class="lbl">ARP Refresh</span></button>
        <button class="op-btn" id="btnHostmap"><span class="icon">⬡</span><span class="lbl">Host Mapping</span></button>
        <button class="op-btn" id="btnRogue"><span class="icon">⚑</span><span class="lbl">Rogue Detection</span></button>
        <button class="op-btn" id="btnInventory"><span class="icon">≡</span><span class="lbl">Inventory</span></button>
        <button class="op-btn" id="btnAnomaly"><span class="icon">⚡</span><span class="lbl">Anomaly Scan</span></button>
        <button class="op-btn" id="btnRescore"><span class="icon">⊙</span><span class="lbl">Rescore Risks</span></button>
        <button class="op-btn" id="btnWatchdog"><span class="icon">◈</span><span class="lbl">Watchdog Check</span></button>
        <button class="op-btn" id="btnDiff"><span class="icon">≠</span><span class="lbl">Network Diff</span></button>
      </div>
    </div>
    <div class="rail-section" id="sec-stats">
      <div class="rail-hdr" onclick="toggleSection('sec-stats')">
        <h4>Network Stats</h4><span class="toggle" id="tog-sec-stats">▾</span>
      </div>
      <div class="rail-body">
        <div class="stat-grid">
          <div class="stat"><div class="sv" id="statHosts">—</div><div class="sl">Hosts</div></div>
          <div class="stat"><div class="sv" id="statSvc">—</div><div class="sl">Services</div></div>
          <div class="stat"><div class="sv warn" id="statWarn">—</div><div class="sl">Warnings</div></div>
          <div class="stat"><div class="sv red" id="statCrit">—</div><div class="sl">Critical</div></div>
        </div>
      </div>
    </div>
    <div class="rail-section" id="sec-jobs">
      <div class="rail-hdr" onclick="toggleSection('sec-jobs')">
        <h4>Recent Jobs</h4><span class="toggle" id="tog-sec-jobs">▾</span>
      </div>
      <div class="rail-body">
        <div id="jobsList" style="display:grid;gap:3px;"></div>
      </div>
    </div>
  </div>

  <div class="canvas-wrap" id="graphWrap">
    <canvas id="graphCanvas"></canvas>
    <div class="graph-search">
      <input id="searchInput" placeholder="Search nodes…"/>
      <select id="typeFilter">
        <option value="">All</option>
        <option value="host">Hosts</option>
        <option value="router">Routers</option>
        <option value="service">Services</option>
        <option value="alert">Alerts</option>
        <option value="subnet">Subnets</option>
      </select>
    </div>
    <div class="graph-tools">
      <button class="gt-btn" id="btnZoomIn">+</button>
      <button class="gt-btn" id="btnZoomOut">−</button>
      <button class="gt-btn" id="btnCenter2">⊕</button>
      <button class="gt-btn" id="btnClearSel">✕</button>
    </div>
  </div>

  <div class="detail-panel" id="detailPanel">
    <div class="dp-hdr">
      <h4 id="detailTitle">No node selected</h4>
      <div class="dp-hdr-actions">
        <button class="btn sm" id="btnDetailRefresh" style="display:none">↻</button>
      </div>
    </div>
    <div class="dp-scroll" id="detailBody">
      <div class="detail-section">
        <p class="empty-state">Click a node to inspect it.</p>
      </div>
    </div>
  </div>
</div>

<div class="bottom">
  <div class="bottom-tabs">
    <button class="tab-btn active" data-tab="scanout">Scan Output</button>
    <button class="tab-btn" data-tab="events">Events</button>
    <button class="tab-btn" data-tab="hosts">Hosts</button>
    <button class="tab-btn" data-tab="reports">Reports</button>
    <button class="tab-btn" data-tab="sysinfo">Sysinfo</button>
  </div>
  <div class="bottom-content">
    <div class="tab-pane active" id="tab-scanout"><div id="scanOutput"></div></div>
    <div class="tab-pane" id="tab-events"><div id="eventFeed"></div></div>
    <div class="tab-pane" id="tab-hosts"><div id="hostsTable"></div></div>
    <div class="tab-pane" id="tab-reports"><div id="reportsList"></div></div>
    <div class="tab-pane" id="tab-sysinfo"><div id="sysinfoContent"><p class="log-line muted">Click ≡ Sysinfo or run Inventory.</p></div></div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let snapshot = null;
let selectedNode = null;
let selectedCtx = null;
let panX = 0, panY = 0, scale = 1;
let dragging = false, dragStartX = 0, dragStartY = 0;
let jobPollTimer = null;

// Force simulation state
let simNodes = [];   // {id, x, y, vx, vy, data}
let simEdges = [];   // {source, target}
let simRunning = false;
let simTimer = null;
const SIM_ALPHA_START = 1.0;
const SIM_ALPHA_DECAY = 0.012;
let simAlpha = 0;

const canvas = document.getElementById('graphCanvas');
const ctx2d = canvas.getContext('2d');

// ── Util ──────────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
function esc(s){ return String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c])); }
function cidr(){ return $('cidrInput').value.trim()||'192.168.0.0/24'; }

function setStatus(label, state='ready'){
  $('statusLabel').textContent = label;
  const dot = $('statusDot');
  dot.className = 'status-pip'+(state==='scanning'?' scanning':state==='error'?' error':'');
}

function addScanLine(text, cls=''){
  const pane=$('scanOutput');
  const div=document.createElement('div');
  div.className='log-line'+(cls?' '+cls:'');
  div.textContent=text;
  pane.appendChild(div);
  pane.scrollTop=pane.scrollHeight;
}

function activateTab(name){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active',b.dataset.tab===name));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.toggle('active',p.id==='tab-'+name));
}

function toggleSection(id){
  const sec=$(id), tog=$('tog-'+id);
  sec.classList.toggle('collapsed');
  if(tog) tog.textContent=sec.classList.contains('collapsed')?'▸':'▾';
}

// ── Force Simulation ──────────────────────────────────────────────────────────
function nodeRadius(n){
  if(n.node_type==='subnet') return 28;
  if(n.node_type==='router') return 18;
  if(n.node_type==='alert')  return 14;
  if(n.node_type==='service') return 9;
  return 13;
}

function nodeColor(n){
  if(n.node_type==='alert'||n.status==='critical') return{fill:'#d61f2c',stroke:'#a00'};
  if(n.status==='warning') return{fill:'#c97b00',stroke:'#a06000'};
  if(n.node_type==='router') return{fill:'#8b3dd6',stroke:'#6b2db0'};
  if(n.node_type==='service') return{fill:'#2a7a4e',stroke:'#1a5a3a'};
  if(n.node_type==='subnet') return{fill:'rgba(42,42,64,.2)',stroke:'#2a2a50'};
  return{fill:'#3b7ecf',stroke:'#2a5fa0'};
}

function initSimulation(nodes, edges){
  const w=canvas.width/scale, h=canvas.height/scale;
  const cx=w/2, cy=h/2;
  simNodes = nodes.map((n,i)=>{
    const existing = simNodes.find(s=>s.id===n.id);
    if(existing) return{...existing, data:n};
    const angle=(Math.PI*2*i)/Math.max(nodes.length,1);
    const r=Math.min(w,h)*0.3;
    return{id:n.id, x:cx+Math.cos(angle)*r, y:cy+Math.sin(angle)*r, vx:0, vy:0, data:n};
  });
  simEdges = edges.map(e=>({source:e.source, target:e.target, data:e}));
  simAlpha = SIM_ALPHA_START;
  if(!simRunning) runSim();
}

function runSim(){
  simRunning = true;
  const step = () => {
    if(simAlpha < 0.01){ simRunning=false; renderGraph(); return; }
    simAlpha *= (1-SIM_ALPHA_DECAY);
    tickForces();
    renderGraph();
    simTimer = requestAnimationFrame(step);
  };
  simTimer = requestAnimationFrame(step);
}

function tickForces(){
  const w=canvas.width/scale, h=canvas.height/scale;
  const cx=w/2, cy=h/2;
  const nodeMap=new Map(simNodes.map(n=>[n.id,n]));

  // Link forces
  for(const e of simEdges){
    const a=nodeMap.get(e.source), b=nodeMap.get(e.target);
    if(!a||!b) continue;
    const dx=b.x-a.x, dy=b.y-a.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||1;
    const targetDist = (a.data.node_type==='subnet'||b.data.node_type==='subnet') ? 160 : 120;
    const force=(dist-targetDist)/dist * 0.08 * simAlpha;
    a.vx+=dx*force; a.vy+=dy*force;
    b.vx-=dx*force; b.vy-=dy*force;
  }

  // Repulsion
  for(let i=0;i<simNodes.length;i++){
    for(let j=i+1;j<simNodes.length;j++){
      const a=simNodes[i], b=simNodes[j];
      const dx=b.x-a.x, dy=b.y-a.y;
      const dist2=dx*dx+dy*dy||1;
      const strength=4000/dist2;
      const fx=dx/Math.sqrt(dist2)*strength;
      const fy=dy/Math.sqrt(dist2)*strength;
      a.vx-=fx; a.vy-=fy;
      b.vx+=fx; b.vy+=fy;
    }
  }

  // Gravity toward center
  for(const n of simNodes){
    n.vx += (cx-n.x)*0.01*simAlpha;
    n.vy += (cy-n.y)*0.01*simAlpha;
  }

  // Integrate + dampen
  for(const n of simNodes){
    n.vx*=0.7; n.vy*=0.7;
    n.x+=n.vx; n.y+=n.vy;
    // Boundary
    const r=nodeRadius(n.data)+8;
    n.x=Math.max(r,Math.min(w-r,n.x));
    n.y=Math.max(r,Math.min(h-r,n.y));
  }
}

// ── API ───────────────────────────────────────────────────────────────────────
async function apiGet(path){ const r=await fetch(path); if(!r.ok) throw new Error(r.status); return r.json(); }
async function apiPost(path){ const r=await fetch(path,{method:'POST'}); if(!r.ok) throw new Error(r.status); return r.json(); }

async function fetchGraph(){
  try{
    setStatus('loading…','scanning');
    const data=await apiGet('/api/graph');
    snapshot=data;
    const q=$('searchInput').value.trim().toLowerCase();
    const t=$('typeFilter').value;
    const filtered=(data.nodes||[]).filter(n=>{
      if(q&&!`${n.label} ${n.id} ${n.ip||''} ${n.hostname||''}`.toLowerCase().includes(q)) return false;
      if(t&&n.node_type!==t) return false;
      return true;
    });
    initSimulation(filtered, (data.edges||[]).filter(e=>{
      const vis=new Set(filtered.map(n=>n.id));
      return vis.has(e.source)&&vis.has(e.target);
    }));
    setStatus('ready','ready');
  } catch(e){ setStatus('error','error'); }
}

async function fetchStats(){
  try{
    const data=await apiGet('/api/stats');
    const s=data.db||{};
    $('statHosts').textContent=s.hosts??'—';
    $('statWarn').textContent=s.warnings??'—';
    $('statCrit').textContent=s.critical??'—';
    $('statSvc').textContent=s.services??'—';
  } catch(e){}
}

async function fetchReports(){
  try{
    const data=await apiGet('/api/reports');
    renderReports(data.reports||[]);
  } catch(e){}
}

async function fetchNode(id){
  try{
    const data=await apiGet('/api/node/'+encodeURIComponent(id));
    selectedCtx=data;
    const node=data.node;
    // Fetch DB services and events for this IP
    let dbServices=[], dbEvents=[], dbNotes='';
    if(node.ip){
      try{ const sv=await apiGet('/api/hosts/'+encodeURIComponent(node.ip)+'/services'); dbServices=sv.services||[]; } catch(e){}
      try{ const ev=await apiGet('/api/hosts/'+encodeURIComponent(node.ip)+'/events'); dbEvents=ev.events||[]; } catch(e){}
      try{ const nt=await apiGet('/api/hosts/'+encodeURIComponent(node.ip)+'/notes'); dbNotes=nt.notes||''; } catch(e){}
    }
    let dbCves=[];
    if(node.ip){ try{ const cv=await apiGet('/api/hosts/'+encodeURIComponent(node.ip)+'/cves'); dbCves=cv.cves||[]; } catch(e){} }
    renderDetail(node, data.neighbors||[], dbEvents, dbServices, dbNotes, dbCves);
    $('btnDetailRefresh').style.display='';
    $('btnDetailRefresh').onclick=()=>fetchNode(id);
  } catch(e){ console.error('fetchNode',e); }
}

    renderJobsList(data.jobs||[]);
  } catch(e){}
}

async function fetchEvents(){

    renderEvents(data.events||[]);
  } catch(e){}
}

async function fetchHosts(){
  try{
    const data=await apiGet('/api/hosts');
    renderHostsTable(data.hosts||[]);
  } catch(e){}
}

async function fetchSysinfo(){
  try{
    const data=await apiGet('/api/sysinfo');
    renderSysinfo(data);
    activateTab('sysinfo');
  } catch(e){}
}

async function pollJob(jid){
  try{
    const job=await apiGet('/api/jobs/'+jid);
    const lines=job.lines||[];
    const pane=$('scanOutput');
    pane.innerHTML='';
    lines.forEach(l=>{
      const cls=l.includes('ERROR')?'err':l.includes('ROGUE')||l.includes('rogue')?'warn':
               l.includes('complete')||l.includes('done')?'ok':
               l.includes('→')||l.includes('Starting')||l.includes('scan:')?'muted':'';
      const d=document.createElement('div');
      d.className='log-line'+(cls?' '+cls:'');
      d.textContent=l; pane.appendChild(d);
    });
    pane.scrollTop=pane.scrollHeight;
    fetchJobs();
    if(job.status==='running'){
      jobPollTimer=setTimeout(()=>pollJob(jid),700);
    } else {
      setStatus(job.status==='done'?'done':'error', job.status==='done'?'ready':'error');
      if(job.status==='done'){
        setTimeout(()=>{ fetchGraph(); fetchStats(); fetchEvents(); fetchHosts(); }, 500);
      }
      if(job.op==='inventory'&&job.result) renderSysinfo(job.result);
    }
  } catch(e){ clearTimeout(jobPollTimer); setStatus('error','error'); }
}

async function runOp(endpoint){
  if(jobPollTimer) clearTimeout(jobPollTimer);
  $('scanOutput').innerHTML='';
  activateTab('scanout');
  setStatus('scanning…','scanning');
  addScanLine('→ POST '+endpoint,'muted');
  try{
    const res=await apiPost(endpoint);
    if(res.job_id) jobPollTimer=setTimeout(()=>pollJob(res.job_id),500);
  } catch(e){ addScanLine('ERROR: '+e,'err'); setStatus('error','error'); }
}

async function runAnomaly(){
  try{
    addScanLine('→ GET /api/scan/anomaly','muted');
    activateTab('scanout');
    const data=await apiGet('/api/scan/anomaly');
    if(data.anomalies&&data.anomalies.length){
      addScanLine(`[!] ${data.anomalies.length} external connections detected:`,'warn');
      data.anomalies.forEach(a=>{
        addScanLine(`  ${a.ip}:${a.port}  status=${a.status}  pid=${a.pid||'?'}  known=${a.known}`,'warn');
      });
    } else {
      addScanLine('[ OK ] No anomalous external connections detected.','ok');
    }
  } catch(e){ addScanLine('ERROR: '+e,'err'); }
}

function renderJobsList(jobs){

    const ls=(h.last_seen||'').replace('T',' ').replace('Z','').slice(0,19)||'—';
    rows+=`<tr onclick="selectHostByIp('${esc(h.ip)}')">

function renderSysinfo(info){
  const wrap=$('sysinfoContent');
  const cpu=info.cpu_percent??null, ram=info.ram_percent??null, disk=info.disk_percent??null;
  const cc=cpu>85?'warn':cpu>60?'warn':'ok', rc=ram>85?'warn':ram>60?'warn':'ok', dc=disk>90?'warn':disk>75?'warn':'ok';
  const ifaces=info.interfaces||{};
  const ifHtml=Object.entries(ifaces).map(([i,ips])=>`<div class="iface-row">${esc(i)}: <span>${esc(ips.join(', '))}</span></div>`).join('')||'<div class="iface-row">—</div>';

    <div class="sysinfo-card"><div class="sc-label">Hostname</div><div class="sc-value" style="font-size:12px;">${esc(info.hostname||'—')}</div></div>
    <div class="sysinfo-card"><div class="sc-label">CPU</div><div class="sc-value ${cc}">${cpu!==null?cpu+'%':'—'}</div>${cpu!==null?`<div class="bar-bg"><div class="bar-fg" style="width:${cpu}%;background:${cpu>85?'var(--warn)':'var(--ok)'}"></div></div>`:''}</div>
    <div class="sysinfo-card"><div class="sc-label">RAM</div><div class="sc-value ${rc}">${ram!==null?info.ram_used_mb+'mb / '+info.ram_total_mb+'mb':'—'}</div>${ram!==null?`<div class="bar-bg"><div class="bar-fg" style="width:${ram}%;background:${ram>85?'var(--warn)':'var(--ok)'}"></div></div>`:''}</div>
    <div class="sysinfo-card"><div class="sc-label">Disk /</div><div class="sc-value ${dc}">${disk!==null?info.disk_used_gb+'gb / '+info.disk_total_gb+'gb':'—'}</div>${disk!==null?`<div class="bar-bg"><div class="bar-fg" style="width:${disk}%;background:${disk>90?'var(--warn)':'var(--ok)'}"></div></div>`:''}</div>
  </div>
  <div style="padding:6px 0 4px;"><div class="sc-label" style="font-size:9px;color:var(--muted);margin-bottom:4px;">INTERFACES</div>${ifHtml}</div>
  ${info.uname?`<div class="log-line muted" style="padding:4px 0;">${esc(info.uname)}</div>`:''}`;
  // Auto-fill CIDR
  const ips=Object.values(ifaces).flat();
  for(const ip of ips){
    if(ip&&!ip.startsWith('127.')){

      }
    }
  }
}

// ── Graph rendering ───────────────────────────────────────────────────────────
function resizeCanvas(){
  const wrap=$('graphWrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  renderGraph();
}

function renderGraph(){
  if(!canvas.width||!canvas.height) return;
  const c=ctx2d;
  c.clearRect(0,0,canvas.width,canvas.height);
  if(!simNodes.length) return;

  const neighborIds=new Set(selectedCtx?.neighbors?.map(n=>n.id)||[]);
  const nodeMap=new Map(simNodes.map(n=>[n.id,n]));

  c.save();
  c.translate(panX,panY);
  c.scale(scale,scale);

  // Edges
  for(const e of simEdges){
    const sp=nodeMap.get(e.source), tp=nodeMap.get(e.target);
    if(!sp||!tp) continue;
    const isHighlight=selectedNode&&(e.source===selectedNode.id||e.target===selectedNode.id);
    const isDim=selectedNode&&!isHighlight;
    c.beginPath(); c.moveTo(sp.x,sp.y); c.lineTo(tp.x,tp.y);
    c.setLineDash(e.data?.edge_type==='contains'?[3,4]:[]);
    c.strokeStyle=isDim?'rgba(42,42,64,.12)':isHighlight?'#d61f2c':
      e.data?.status==='critical'?'rgba(214,31,44,.6)':
      e.data?.status==='warning'?'rgba(201,123,0,.4)':'#252538';
    c.lineWidth=isHighlight?1.5:1;
    c.globalAlpha=isDim?.1:1;
    c.stroke();
    c.setLineDash([]); c.globalAlpha=1;
  }

  // Nodes
  for(const sn of simNodes){
    const n=sn.data;
    const r=nodeRadius(n), col=nodeColor(n);
    const isSelected=selectedNode?.id===n.id;
    const isNeighbor=neighborIds.has(n.id);
    const isDim=selectedNode&&!isSelected&&!isNeighbor;
    c.globalAlpha=isDim?.18:1;

    if(n.node_type==='subnet'){
      c.beginPath(); c.arc(sn.x,sn.y,r,0,Math.PI*2);
      c.fillStyle='rgba(42,42,64,.12)'; c.fill();
      c.setLineDash([5,4]);
      c.strokeStyle=isSelected?'#d61f2c':'#2a2a50';
      c.lineWidth=isSelected?2:1.5;
      c.stroke(); c.setLineDash([]);
    } else {
      if(isSelected){
        c.beginPath(); c.arc(sn.x,sn.y,r+6,0,Math.PI*2);
        c.strokeStyle='rgba(214,31,44,.3)'; c.lineWidth=1.5; c.stroke();
      }
      c.beginPath(); c.arc(sn.x,sn.y,r,0,Math.PI*2);
      c.fillStyle=col.fill; c.fill();
      c.strokeStyle=isSelected?'#ff4455':col.stroke;
      c.lineWidth=isSelected?2:1; c.stroke();
    }

    c.globalAlpha=isDim?.15:1;
    c.fillStyle=isSelected?'#f0f1f3':'#7a8090';
    c.font=(isSelected?'700 ':'')+'9px JetBrains Mono,monospace';
    c.textAlign='center';
    const label=n.label.length>20?n.label.slice(0,18)+'…':n.label;
    c.fillText(label,sn.x,sn.y+r+11);
    c.globalAlpha=1;
  }

  c.restore();
}

// ── Canvas events ─────────────────────────────────────────────────────────────
function canvasXY(e){
  const rect=canvas.getBoundingClientRect();
  return{x:(e.clientX-rect.left-panX)/scale, y:(e.clientY-rect.top-panY)/scale};
}

canvas.addEventListener('click',e=>{
  const{x,y}=canvasXY(e);
  let hit=null;
  for(const sn of simNodes){
    if(Math.hypot(x-sn.x,y-sn.y)<nodeRadius(sn.data)+5){hit=sn.data;break;}
  }
  if(hit){ selectedNode=hit; fetchNode(hit.id); renderGraph(); }
  else clearDetail();
});

canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const f=e.deltaY<0?1.1:.91;
  scale=Math.max(.25,Math.min(4,scale*f));
  renderGraph();
},{passive:false});

canvas.addEventListener('mousedown',e=>{ dragging=true; dragStartX=e.clientX-panX; dragStartY=e.clientY-panY; });
window.addEventListener('mousemove',e=>{ if(!dragging) return; panX=e.clientX-dragStartX; panY=e.clientY-dragStartY; renderGraph(); });
window.addEventListener('mouseup',()=>{ dragging=false; });

// ── Wiring ────────────────────────────────────────────────────────────────────
$('btnRefresh').onclick=fetchGraph;
$('btnCenter').onclick=$('btnCenter2').onclick=()=>{ panX=0; panY=0; scale=1; renderGraph(); };
$('btnClearSel').onclick=clearDetail;
$('btnZoomIn').onclick=()=>{ scale=Math.min(4,scale*1.2); renderGraph(); };
$('btnZoomOut').onclick=()=>{ scale=Math.max(.25,scale/1.2); renderGraph(); };
$('btnDiscovery').onclick=()=>runOp('/api/scan/discovery?cidr='+encodeURIComponent(cidr()));
$('btnArp').onclick=()=>runOp('/api/scan/arp');
$('btnHostmap').onclick=()=>runOp('/api/scan/hostmap?cidr='+encodeURIComponent(cidr()));
$('btnRogue').onclick=()=>runOp('/api/scan/rogue?cidr='+encodeURIComponent(cidr()));
$('btnInventory').onclick=()=>runOp('/api/scan/inventory');
$('btnAnomaly').onclick=()=>runAnomaly();
$('btnRescore').onclick=async()=>{
  addScanLine('→ POST /api/scan/rescore','muted'); activateTab('scanout');
  const d=await apiPost('/api/scan/rescore');
  addScanLine(`Rescored ${d.rescored} hosts. Flagged: ${d.flagged}`,'ok');
  d.results?.filter(r=>r.status!=='normal').forEach(r=>{
    addScanLine(`  [${r.status.toUpperCase()}] ${r.ip}  risk=${r.risk_score}`,'warn');
    r.reasons?.forEach(reason=>addScanLine(`    - ${reason}`,'muted'));
  });
  fetchGraph(); fetchStats();
};
$('btnWatchdog').onclick=async()=>{
  addScanLine('→ GET /api/watchdog','muted'); activateTab('scanout');
  const d=await apiGet('/api/watchdog');
  addScanLine(`Watchdog: ${d.online_count} online, ${d.offline_count} offline of ${d.online_count+d.offline_count} baseline hosts`,'ok');
  d.offline?.forEach(o=>addScanLine(`  [OFFLINE] ${o.ip}  ${o.hostname}  mac=${o.mac}`,'warn'));
};
$('btnDiff').onclick=async()=>{
  addScanLine('→ GET /api/diff','muted'); activateTab('scanout');
  const d=await apiGet('/api/diff');
  addScanLine(d.summary,'ok');
  d.appeared?.forEach(h=>addScanLine(`  [NEW]     ${h.ip}  ${h.hostname}  mac=${h.mac}  vendor=${h.vendor}`,'ok'));
  d.disappeared?.forEach(h=>addScanLine(`  [GONE]    ${h.ip}  ${h.hostname}`,'warn'));
  d.changed?.forEach(h=>{
    addScanLine(`  [CHANGED] ${h.ip}  ${h.hostname}`,'warn');
    h.changes?.forEach(c=>addScanLine(`    ${c}`,'muted'));
  });
};
$('btnSysinfo').onclick=fetchSysinfo;
$('btnReport').onclick=()=>window.open('/api/export/report','_blank');
$('searchInput').oninput=fetchGraph;
$('typeFilter').onchange=fetchGraph;
document.querySelectorAll('.tab-btn').forEach(b=>b.onclick=()=>{
  activateTab(b.dataset.tab);
  if(b.dataset.tab==='events') fetchEvents();
  if(b.dataset.tab==='hosts') fetchHosts();
  if(b.dataset.tab==='sysinfo') fetchSysinfo();
});
window.addEventListener('resize',resizeCanvas);

// ── Init ──────────────────────────────────────────────────────────────────────
resizeCanvas();
fetchGraph();
fetchStats();
fetchReports();
fetchJobs();
fetchSysinfo();
setInterval(fetchGraph,25000);
setInterval(fetchStats,10000);
setInterval(fetchJobs,4000);
</script>
